name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run unit tests (no network)
        run: pytest tests/test_analyze.py tests/test_cache.py tests/test_serve.py::TestToolRegistry tests/test_serve.py::TestStdioSDK tests/test_execute.py::TestToolDefinition tests/test_execute.py::TestWebExecutorToolLookup tests/test_extract.py::TestDataclasses -v

      - name: Run integration tests (network)
        run: pytest -k "Live or LiveExtraction or HTTPTransport" -v
        continue-on-error: true  # network flakiness shouldn't fail the build
